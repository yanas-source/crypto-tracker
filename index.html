<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моніторинг Транзакцій Гаманця</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }
        h1, h2 { color: #ffffff; }
        .card {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .wallet-info {
            font-size: 1.1em;
            word-break: break-all;
        }
        .network-selector {
            margin-bottom: 15px;
        }
        select, button {
            padding: 10px;
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background-color: #444; }
        ul { list-style-type: none; padding: 0; }
        li {
            background-color: #2a2a2a;
            margin: 8px 0;
            padding: 12px;
            border-radius: 5px;
            word-break: break-all;
        }
        a {
            color: #4da6ff;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover { text-decoration: underline; }
        .status {
            font-size: 0.85em;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <h1>🔍 Монітор Блокчейн-Транзакцій</h1>

    <div class="card">
        <div class="network-selector">
            <label for="network">Оберіть мережу: </label>
            <select id="network" onchange="loadTransactions()">
                <option value="tron">TRON (TronScan)</option>
                <option value="ethereum">Ethereum (Etherscan)</option>
            </select>
            <button onclick="loadTransactions()">Оновити 🔄</button>
        </div>

        <div class="wallet-info">
            <strong>Закріплений гаманець:</strong> 
            <span id="wallet-address">Завантаження...</span>
        </div>
        <div class="status" id="auto-refresh-status">Автооновлення кожні 30 секунд ⏱️</div>
    </div>

    <div class="card">
        <h2>Останні транзакції (Посиланням):</h2>
        <div id="loading">Завантаження транзакцій...</div>
        <ul id="tx-list"></ul>
    </div>

    <script>
        // ⚙️ Закріплений гаманець TRON та заповнювач для Ethereum
        const WALLETS = {
            tron: "TQV87TW3P8XN3h9WbjE99HCJMc9ZLeSyMT", 
            ethereum: "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"
        };

        async function loadTransactions() {
            const network = document.getElementById('network').value;
            const address = WALLETS[network];
            const txList = document.getElementById('tx-list');
            const loading = document.getElementById('loading');
            
            document.getElementById('wallet-address').innerText = address;
            txList.innerHTML = '';
            loading.innerText = 'Оновлення даних...';
            loading.style.display = 'block';

            try {
                if (network === 'tron') {
                    await fetchTronTx(address);
                } else if (network === 'ethereum') {
                    await fetchEthTx(address);
                }
            } catch (error) {
                loading.innerText = 'Помилка завантаження даних з API.';
                console.error(error);
            }
        }

        async function fetchTronTx(address) {
            const response = await fetch(`https://apilist.tronscan.org/api/transaction?sort=-timestamp&limit=15&start=0&address=${address}`);
            const data = await response.json();
            const txs = data.data;
            const txList = document.getElementById('tx-list');
            const loading = document.getElementById('loading');

            if (!txs || txs.length === 0) {
                loading.innerText = 'Транзакцій не знайдено.';
                return;
            }

            loading.style.display = 'none';
            txs.forEach(tx => {
                const li = document.createElement('li');
                const fullUrl = `https://tronscan.org/#/transaction/${tx.hash}`;
                li.innerHTML = `🔗 <a href="${fullUrl}" target="_blank">${fullUrl}</a>`;
                txList.appendChild(li);
            });
        }

        async function fetchEthTx(address) {
            const response = await fetch(`https://api.blockchair.com/ethereum/dashboards/address/${address}?limit=15`);
            const data = await response.json();
            const txList = document.getElementById('tx-list');
            const loading = document.getElementById('loading');

            const calls = data.data[address.toLowerCase()]?.calls;

            if (!calls || calls.length === 0) {
                loading.innerText = 'Транзакцій не знайдено.';
                return;
            }

            loading.style.display = 'none';
            calls.forEach(call => {
                const li = document.createElement('li');
                const fullUrl = `https://etherscan.io/tx/${call.transaction_hash}`;
                li.innerHTML = `🔗 <a href="${fullUrl}" target="_blank">${fullUrl}</a>`;
                txList.appendChild(li);
            });
        }

        // Запуск при завантаженні сторінки
        window.onload = () => {
            loadTransactions();
            // Автоматичне оновлення кожні 30 секунд
            setInterval(loadTransactions, 30000);
        };
    </script>
</body>
</html>
